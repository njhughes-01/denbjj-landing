<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEN BJJ - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            text-align: center;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            max-width: 300px;
            width: 100%;
            height: auto;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ffffff, #a8dadc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: #a8dadc;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .coming-soon {
            display: inline-block;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .coming-soon:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            margin-top: 40px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
        }

        .contact {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .contact a {
            color: #a8dadc;
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }

        .contact a:hover {
            color: #ffffff;
        }

        @media (max-width: 768px) {
            .logo {
                max-width: 200px;
                margin-bottom: 30px;
            }

            .subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo_white.png" alt="DEN BJJ Logo" class="logo">
        
        <h1>DEN BJJ</h1>
        
        <p class="tagline">Brazilian Jiu Jitsu - Aurora, Colorado</p>
        
        <div class="coming-soon">Coming Soon</div>
        
        <p class="subtitle">
            Building a community focused on exploration, self-discovery, and developing your own jiu jitsu.
            <br>
            Adult and kids classes in the Denver metro area.
        </p>
        
        <div class="contact">
            <p>Interested in training?</p>
            <a href="mailto:nathan@denbjj.com">nathan@denbjj.com</a>
        </div>
    </div>
</body>
</html>
